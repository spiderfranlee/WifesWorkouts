<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #fafafa;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-active { color: #059669; }
        .tab-inactive { color: #a1a1aa; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-zinc-900 pb-24">
    <header class="bg-white border-b border-zinc-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-md mx-auto px-4 h-14 flex items-center justify-center">
            <h1 class="text-lg font-bold flex items-center gap-2 tracking-tight">
                <i class="fas fa-heartbeat text-emerald-600"></i>
                FitTrack
            </h1>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4" id="app-container">
        <!-- Creator Tab -->
        <div id="creator-view" class="space-y-8">
            <section>
                <h2 class="text-xl font-bold mb-4 tracking-tight">Workout Creator</h2>
                <form id="creator-form" class="bg-white p-5 rounded-2xl shadow-sm border border-zinc-100 space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-zinc-500 mb-1.5 uppercase tracking-wider">Exercise Name</label>
                        <input type="text" id="ex-name" required class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-zinc-500 mb-1.5 uppercase tracking-wider">Sets</label>
                            <input type="number" id="ex-sets" min="1" required class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-500 mb-1.5 uppercase tracking-wider">Reps</label>
                            <input type="text" id="ex-reps" required class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-zinc-500 mb-1.5 uppercase tracking-wider">Rest Time</label>
                            <input type="text" id="ex-rest" placeholder="e.g. 60s" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-500 mb-1.5 uppercase tracking-wider">Set Type</label>
                            <select id="ex-type" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all appearance-none">
                                <option>Single set</option>
                                <option>Superset</option>
                                <option>Triset</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2 mt-2 shadow-sm">
                        <i class="fas fa-plus"></i> Add Exercise
                    </button>
                </form>
            </section>

            <section id="routine-section" class="hidden">
                <h3 class="text-sm font-bold text-zinc-900 mb-3 uppercase tracking-wider">Your Routine</h3>
                <div id="routine-list" class="space-y-3"></div>
            </section>
        </div>

        <!-- Logger Tab -->
        <div id="logger-view" class="space-y-6 hidden">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-bold tracking-tight">Workout Logger</h2>
                <button id="finish-workout-btn" class="hidden text-sm bg-zinc-900 text-white px-5 py-2 rounded-full font-semibold hover:bg-zinc-800 transition-colors flex items-center gap-1.5 shadow-sm">
                    <i class="fas fa-check-circle"></i> Finish
                </button>
            </div>

            <div id="empty-logger" class="text-center py-16 text-zinc-500 bg-white rounded-3xl border border-zinc-100 shadow-sm">
                <i class="fas fa-dumbbell text-4xl mb-4 text-zinc-300"></i>
                <p class="font-medium text-zinc-900">No exercises yet</p>
                <p class="text-sm mt-1">Go to the Creator tab to add some.</p>
            </div>

            <div id="logger-list" class="space-y-6"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-200 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.02)] z-20">
        <div class="max-w-md mx-auto flex">
            <button id="tab-creator" class="flex-1 py-3.5 flex flex-col items-center gap-1.5 text-[10px] font-bold uppercase tracking-wider transition-colors tab-active">
                <i class="fas fa-list text-lg"></i> Creator
            </button>
            <button id="tab-logger" class="flex-1 py-3.5 flex flex-col items-center gap-1.5 text-[10px] font-bold uppercase tracking-wider transition-colors tab-inactive">
                <i class="fas fa-dumbbell text-lg"></i> Logger
            </button>
        </div>
    </nav>

    <script>
        // State
        let exercises = JSON.parse(localStorage.getItem('fit_exercises_vanilla')) || [];
        let sessionData = JSON.parse(localStorage.getItem('fit_session_vanilla')) || {};
        let logs = JSON.parse(localStorage.getItem('fit_logs_vanilla')) || {};

        // DOM Elements
        const creatorView = document.getElementById('creator-view');
        const loggerView = document.getElementById('logger-view');
        const tabCreator = document.getElementById('tab-creator');
        const tabLogger = document.getElementById('tab-logger');
        
        const creatorForm = document.getElementById('creator-form');
        const routineSection = document.getElementById('routine-section');
        const routineList = document.getElementById('routine-list');
        
        const emptyLogger = document.getElementById('empty-logger');
        const loggerList = document.getElementById('logger-list');
        const finishWorkoutBtn = document.getElementById('finish-workout-btn');

        // Save state
        function saveState() {
            localStorage.setItem('fit_exercises_vanilla', JSON.stringify(exercises));
            localStorage.setItem('fit_session_vanilla', JSON.stringify(sessionData));
            localStorage.setItem('fit_logs_vanilla', JSON.stringify(logs));
        }

        // Generate UUID
        function uuidv4() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Tabs
        tabCreator.addEventListener('click', () => {
            creatorView.classList.remove('hidden');
            loggerView.classList.add('hidden');
            tabCreator.classList.replace('tab-inactive', 'tab-active');
            tabLogger.classList.replace('tab-active', 'tab-inactive');
            renderCreator();
        });

        tabLogger.addEventListener('click', () => {
            creatorView.classList.add('hidden');
            loggerView.classList.remove('hidden');
            tabCreator.classList.replace('tab-active', 'tab-inactive');
            tabLogger.classList.replace('tab-inactive', 'tab-active');
            renderLogger();
        });

        // Add Exercise
        creatorForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('ex-name').value;
            const sets = parseInt(document.getElementById('ex-sets').value, 10);
            const reps = document.getElementById('ex-reps').value;
            const rest = document.getElementById('ex-rest').value;
            const type = document.getElementById('ex-type').value;

            const newEx = { id: uuidv4(), name, sets, reps, restTime: rest, setType: type };
            exercises.push(newEx);
            saveState();
            
            creatorForm.reset();
            document.getElementById('ex-type').value = 'Single set';
            renderCreator();
        });

        // Delete Exercise
        window.deleteExercise = function(id) {
            exercises = exercises.filter(ex => ex.id !== id);
            delete sessionData[id];
            saveState();
            renderCreator();
            renderLogger();
        }

        // Render Creator
        function renderCreator() {
            if (exercises.length === 0) {
                routineSection.classList.add('hidden');
                return;
            }
            
            routineSection.classList.remove('hidden');
            routineList.innerHTML = exercises.map(ex => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-zinc-100 flex justify-between items-center">
                    <div>
                        <h4 class="font-semibold text-zinc-900">${ex.name}</h4>
                        <p class="text-xs text-zinc-500 mt-1 font-medium">
                            ${ex.sets} sets × ${ex.reps} reps • ${ex.setType} ${ex.restTime ? `• ${ex.restTime} rest` : ''}
                        </p>
                    </div>
                    <button onclick="deleteExercise('${ex.id}')" class="text-zinc-300 hover:text-red-500 transition-colors p-2 rounded-lg hover:bg-red-50">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        // Render Logger
        function renderLogger() {
            if (exercises.length === 0) {
                emptyLogger.classList.remove('hidden');
                loggerList.classList.add('hidden');
                finishWorkoutBtn.classList.add('hidden');
                return;
            }

            emptyLogger.classList.add('hidden');
            loggerList.classList.remove('hidden');
            finishWorkoutBtn.classList.remove('hidden');

            loggerList.innerHTML = exercises.map(ex => {
                const exData = sessionData[ex.id] || [];
                
                let setsHtml = '';
                for (let i = 0; i < ex.sets; i++) {
                    const weight = exData[i]?.weight || '';
                    const reps = exData[i]?.reps || '';
                    setsHtml += `
                        <div class="grid grid-cols-[auto_1fr_1fr] gap-3 items-center">
                            <div class="w-8 h-8 rounded-full bg-zinc-100 flex items-center justify-center text-xs font-bold text-zinc-600">
                                ${i + 1}
                            </div>
                            <input type="number" placeholder="0" value="${weight}" oninput="updateSession('${ex.id}', ${i}, 'weight', this.value)" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-3 py-2.5 text-sm text-center font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                            <input type="number" placeholder="0" value="${reps}" oninput="updateSession('${ex.id}', ${i}, 'reps', this.value)" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-3 py-2.5 text-sm text-center font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                        </div>
                    `;
                }

                return `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-zinc-100">
                        <div class="mb-5">
                            <h3 class="font-bold text-zinc-900 text-lg">${ex.name}</h3>
                            <p class="text-xs font-medium text-zinc-500 mt-0.5">Target: ${ex.sets} sets × ${ex.reps} reps</p>
                        </div>
                        <div class="space-y-3">
                            <div class="grid grid-cols-[auto_1fr_1fr] gap-3 px-1">
                                <div class="text-[10px] font-bold text-zinc-400 w-8 text-center uppercase tracking-wider">Set</div>
                                <div class="text-[10px] font-bold text-zinc-400 text-center uppercase tracking-wider">Weight</div>
                                <div class="text-[10px] font-bold text-zinc-400 text-center uppercase tracking-wider">Reps</div>
                            </div>
                            ${setsHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update Session
        window.updateSession = function(exId, setIndex, field, value) {
            if (!sessionData[exId]) sessionData[exId] = [];
            while (sessionData[exId].length <= setIndex) {
                sessionData[exId].push({ weight: '', reps: '' });
            }
            sessionData[exId][setIndex][field] = value;
            saveState();
        };

        // Finish Workout
        finishWorkoutBtn.addEventListener('click', () => {
            if (Object.keys(sessionData).length === 0) {
                alert('No data to save!');
                return;
            }

            const date = new Date().toISOString();
            Object.keys(sessionData).forEach(exId => {
                if (!logs[exId]) logs[exId] = [];
                logs[exId].push({
                    id: uuidv4(),
                    date,
                    exerciseId: exId,
                    sets: sessionData[exId]
                });
            });
            
            sessionData = {};
            saveState();
            renderLogger();
            alert('Workout saved successfully!');
        });

        // Init
        renderCreator();
    </script>
</body>
</html>

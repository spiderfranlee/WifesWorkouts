<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #222222; color: #e5e5e5; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .bg-card { background-color: #333333; }
        .bg-input { background-color: #1a1a1a; }
        .border-subtle { border-color: #444444; }
        .text-subtle { color: #a3a3a3; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .tab-inactive { color: #737373; }
        .hidden { display: none !important; }
        
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #222; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Markdown styles */
        .markdown-body p { margin-bottom: 0.5em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-body strong { font-weight: 600; color: #fff; }
    </style>
</head>
<body class="pb-24">
    <header class="bg-[#1a1a1a] border-b border-subtle sticky top-0 z-20 shadow-md">
        <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
            <h1 class="text-lg font-bold text-white tracking-tight">FitTrack Pro</h1>
            <div class="flex gap-4 h-full items-center">
                <div id="auth-container" class="mr-2"></div>
                <button id="tab-workouts" class="h-full px-2 tab-active font-medium text-sm transition-colors">Workouts</button>
                <button id="tab-creator" class="hidden h-full px-2 tab-inactive font-medium text-sm transition-colors">Creator</button>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4" id="app-container">
        <!-- Workouts List / Logger View -->
        <div id="workouts-view" class="space-y-6 animate-in fade-in duration-300">
            <div id="admin-client-selector" class="hidden bg-card border border-subtle rounded-lg p-4 shadow-sm">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">View Client Workouts</label>
                <select id="w-client-select" onchange="selectClientWorkouts(this.value)" class="w-full bg-input border border-subtle rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors">
                    <option value="">Select a client...</option>
                </select>
            </div>
            <div id="workouts-list" class="space-y-4"></div>
            
            <div id="active-workout" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="closeWorkout()" class="text-sm text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-2">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <button id="btn-delete-workout" onclick="deleteActiveWorkout()" class="hidden text-sm text-red-400 hover:text-red-300 transition-colors">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
                <div id="workout-display"></div>
            </div>
        </div>

        <!-- Creator View -->
        <div id="creator-view" class="hidden space-y-4 animate-in fade-in duration-300">
            <select id="c-client-select" class="w-full bg-input border border-subtle rounded px-3 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors shadow-sm">
                <option value="">Assign to Client...</option>
            </select>
            <input type="text" id="c-title" placeholder="Workout Title (e.g. Full-Body Balance)" class="w-full bg-transparent text-xl font-bold text-white placeholder-gray-500 focus:outline-none border-b border-subtle pb-2">
            
            <textarea id="c-notes" placeholder="Coach's Notes / Warmup..." class="w-full bg-transparent text-sm text-subtle placeholder-gray-600 focus:outline-none resize-none h-24 pt-2"></textarea>
            
            <div id="c-exercises" class="space-y-4 mt-4"></div>
            
            <div class="flex gap-2 mt-4">
                <button onclick="addCreatorExercise()" class="flex-1 bg-card border border-subtle hover:bg-[#444] text-white py-3 rounded text-sm font-medium transition-colors shadow-sm">
                    + Exercise
                </button>
            </div>

            <textarea id="c-cooldown" placeholder="Add cooldown..." class="w-full bg-transparent text-sm text-subtle placeholder-gray-600 focus:outline-none resize-none h-16 mt-6 border-b border-subtle pt-2"></textarea>
            
            <div class="flex gap-3 mt-8">
                <button onclick="saveWorkout()" class="flex-1 bg-[#3b82f6] hover:bg-blue-600 text-white py-3 rounded text-sm font-medium transition-colors shadow-sm">Save Workout</button>
                <button onclick="clearCreator()" class="bg-card border border-subtle hover:bg-[#444] text-white px-6 py-3 rounded text-sm font-medium transition-colors">Clear</button>
            </div>
        </div>
    </main>

    <!-- Chatbot UI -->
    <div id="chatbot-container" class="fixed bottom-4 right-4 z-50 flex flex-col items-end">
        <!-- Chat Window -->
        <div id="chat-window" class="hidden w-80 sm:w-96 bg-card border border-subtle rounded-lg shadow-xl mb-4 flex flex-col overflow-hidden transition-all duration-300 transform origin-bottom-right">
            <!-- Header -->
            <div class="bg-[#1a1a1a] border-b border-subtle p-3 flex justify-between items-center">
                <h3 class="text-white font-medium flex items-center gap-2">
                    <i class="fas fa-robot text-blue-400"></i> AI Coach
                </h3>
                <button onclick="toggleChat()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <!-- Messages -->
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto h-80 space-y-4 bg-[#222]">
                <div class="flex gap-2">
                    <div class="w-8 h-8 rounded-full bg-blue-900 flex items-center justify-center shrink-0 mt-1">
                        <i class="fas fa-robot text-blue-300 text-xs"></i>
                    </div>
                    <div class="bg-[#333] text-sm text-gray-200 p-3 rounded-lg rounded-tl-none markdown-body">
                        Hi! I'm your AI Coach. Ask me how to perform any exercise!
                    </div>
                </div>
            </div>
            <!-- Input -->
            <div class="p-3 bg-[#1a1a1a] border-t border-subtle flex gap-2">
                <input type="text" id="chat-input" placeholder="Ask about an exercise..." class="flex-1 bg-input border border-subtle rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors" onkeypress="if(event.key === 'Enter') sendChatMessage()">
                <button onclick="sendChatMessage()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2 rounded transition-colors flex items-center justify-center">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
        
        <!-- Floating Button -->
        <button onclick="toggleChat()" class="w-14 h-14 bg-blue-600 hover:bg-blue-500 text-white rounded-full shadow-lg flex items-center justify-center transition-transform hover:scale-105">
            <i class="fas fa-comments text-2xl"></i>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { GoogleGenAI } from "@google/genai";

        const firebaseConfig = {
            projectId: "gen-lang-client-0185754107",
            appId: "1:59383295522:web:259817bf82543d517f647b",
            apiKey: "AIzaSyB-P8uckA9iBI0K2g-94Lq2qjKBkdztw2M",
            authDomain: "gen-lang-client-0185754107.firebaseapp.com",
            firestoreDatabaseId: "ai-studio-7fb697f5-481e-4447-8260-cfb1bcf0dc13",
            storageBucket: "gen-lang-client-0185754107.firebasestorage.app",
            messagingSenderId: "59383295522",
            measurementId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
        const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });

        // State
        const ADMIN_EMAIL = 'franleept@gmail.com';
        let isAdmin = false;
        let allUsers = [];
        let currentViewUid = null;
        let workouts = [];
        let creatorExercises = [];
        let activeWorkoutId = null;
        let currentUser = null;
        let unsubscribeWorkouts = null;

        // DOM Elements
        const viewWorkouts = document.getElementById('workouts-view');
        const viewCreator = document.getElementById('creator-view');
        const tabWorkouts = document.getElementById('tab-workouts');
        const tabCreator = document.getElementById('tab-creator');
        const listWorkouts = document.getElementById('workouts-list');
        const activeWorkoutContainer = document.getElementById('active-workout');
        const workoutDisplay = document.getElementById('workout-display');
        const cExercises = document.getElementById('c-exercises');
        const authContainer = document.getElementById('auth-container');
        const adminClientSelector = document.getElementById('admin-client-selector');
        const btnDeleteWorkout = document.getElementById('btn-delete-workout');

        // Auth Logic
        window.login = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login failed", error);
                alert("Login failed: " + error.message);
            }
        };

        window.logout = async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("Logout failed", error);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                isAdmin = user.email === ADMIN_EMAIL;
                
                // Save user profile
                try {
                    await setDoc(doc(db, 'users', user.uid), {
                        uid: user.uid,
                        email: user.email,
                        name: user.displayName || user.email,
                        lastLogin: new Date().toISOString()
                    }, { merge: true });
                } catch (e) {
                    console.error("Error saving user profile", e);
                }

                authContainer.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${user.photoURL}" alt="Profile" class="w-6 h-6 rounded-full" referrerpolicy="no-referrer">
                        <button onclick="logout()" class="text-xs text-gray-400 hover:text-white transition-colors">Logout</button>
                    </div>
                `;

                if (isAdmin) {
                    tabCreator.classList.remove('hidden');
                    adminClientSelector.classList.remove('hidden');
                    btnDeleteWorkout.classList.remove('hidden');
                    
                    // Fetch all users for admin dropdowns
                    onSnapshot(collection(db, 'users'), (snapshot) => {
                        allUsers = snapshot.docs.map(doc => doc.data());
                        renderClientDropdowns();
                    });
                    
                    // Admin doesn't auto-subscribe until they pick a client
                    workouts = [];
                    renderWorkoutsList();
                } else {
                    tabCreator.classList.add('hidden');
                    adminClientSelector.classList.add('hidden');
                    btnDeleteWorkout.classList.add('hidden');
                    currentViewUid = user.uid;
                    subscribeToWorkouts(user.uid);
                }
            } else {
                isAdmin = false;
                currentViewUid = null;
                tabCreator.classList.add('hidden');
                adminClientSelector.classList.add('hidden');
                btnDeleteWorkout.classList.add('hidden');
                
                authContainer.innerHTML = `
                    <button onclick="login()" class="text-sm bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded transition-colors">Login</button>
                `;
                if (unsubscribeWorkouts) {
                    unsubscribeWorkouts();
                    unsubscribeWorkouts = null;
                }
                workouts = [];
                renderWorkoutsList();
                if (activeWorkoutId) closeWorkout();
            }
        });

        window.renderClientDropdowns = () => {
            const wSelect = document.getElementById('w-client-select');
            const cSelect = document.getElementById('c-client-select');
            
            const options = `<option value="">Select a client...</option>` + 
                allUsers.filter(u => u.email !== ADMIN_EMAIL).map(u => `<option value="${u.uid}">${u.name} (${u.email})</option>`).join('');
                
            const wVal = wSelect.value;
            const cVal = cSelect.value;
            
            wSelect.innerHTML = options;
            cSelect.innerHTML = options.replace('Select a client...', 'Assign to Client...');
            
            if (wVal) wSelect.value = wVal;
            if (cVal) cSelect.value = cVal;
        };

        window.selectClientWorkouts = (uid) => {
            currentViewUid = uid;
            if (uid) {
                subscribeToWorkouts(uid);
            } else {
                if (unsubscribeWorkouts) {
                    unsubscribeWorkouts();
                    unsubscribeWorkouts = null;
                }
                workouts = [];
                renderWorkoutsList();
                if (activeWorkoutId) closeWorkout();
            }
        };

        function subscribeToWorkouts(uid) {
            if (!uid) return;
            if (unsubscribeWorkouts) unsubscribeWorkouts();
            
            const q = query(collection(db, 'users', uid, 'workouts'), orderBy('date', 'desc'));
            unsubscribeWorkouts = onSnapshot(q, (snapshot) => {
                workouts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (activeWorkoutId) {
                    // If the active workout was deleted, close it
                    if (!workouts.find(w => w.id === activeWorkoutId)) {
                        closeWorkout();
                    } else {
                        renderActiveWorkout();
                    }
                } else {
                    renderWorkoutsList();
                }
            }, (error) => {
                console.error("Error fetching workouts:", error);
                alert("Error fetching workouts: " + error.message);
            });
        }

        // Tab Switching
        window.switchTab = (tab) => {
            if (tab === 'workouts') {
                viewWorkouts.classList.remove('hidden');
                viewCreator.classList.add('hidden');
                tabWorkouts.classList.replace('tab-inactive', 'tab-active');
                tabCreator.classList.replace('tab-active', 'tab-inactive');
                renderWorkoutsList();
            } else {
                if (!currentUser) {
                    alert("Please login to create workouts.");
                    return;
                }
                viewWorkouts.classList.add('hidden');
                viewCreator.classList.remove('hidden');
                tabWorkouts.classList.replace('tab-active', 'tab-inactive');
                tabCreator.classList.replace('tab-inactive', 'tab-active');
                if(creatorExercises.length === 0) addCreatorExercise();
            }
        };

        tabWorkouts.onclick = () => switchTab('workouts');
        tabCreator.onclick = () => switchTab('creator');

        function uuid() { return Math.random().toString(36).substr(2, 9); }

        // --- Creator Logic ---
        window.addCreatorExercise = () => {
            creatorExercises.push({ id: uuid(), label: '', name: '', prescription: '' });
            renderCreatorExercises();
        };

        window.removeCreatorExercise = (id) => {
            creatorExercises = creatorExercises.filter(e => e.id !== id);
            renderCreatorExercises();
        };

        window.updateCreatorExercise = (id, field, value) => {
            const ex = creatorExercises.find(e => e.id === id);
            if (ex) ex[field] = value;
        };

        function renderCreatorExercises() {
            cExercises.innerHTML = creatorExercises.map((ex, index) => `
                <div class="bg-card border border-subtle rounded p-3 relative shadow-sm">
                    <button onclick="removeCreatorExercise('${ex.id}')" class="absolute top-2 right-2 text-gray-500 hover:text-red-400 p-1 transition-colors"><i class="fas fa-times"></i></button>
                    <div class="flex gap-3 mb-3 pr-8">
                        <input type="text" placeholder="A1" value="${ex.label}" oninput="updateCreatorExercise('${ex.id}', 'label', this.value)" class="w-16 bg-input border border-subtle rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors">
                        <input type="text" placeholder="Exercise Name" value="${ex.name}" oninput="updateCreatorExercise('${ex.id}', 'name', this.value)" class="flex-1 bg-input border border-subtle rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <textarea placeholder="Prescription (e.g. 12 reps x 3 sets; 70% 1RM, Triset)" oninput="updateCreatorExercise('${ex.id}', 'prescription', this.value)" class="w-full bg-input border border-subtle rounded px-3 py-2 text-sm text-subtle focus:outline-none focus:border-blue-500 resize-none h-16 transition-colors">${ex.prescription}</textarea>
                </div>
            `).join('');
        }

        window.saveWorkout = async () => {
            if (!isAdmin) return;
            
            const targetUid = document.getElementById('c-client-select').value;
            if (!targetUid) {
                alert("Please select a client to assign this workout to.");
                return;
            }

            const title = document.getElementById('c-title').value.trim() || 'Untitled Workout';
            const notes = document.getElementById('c-notes').value.trim();
            const cooldown = document.getElementById('c-cooldown').value.trim();
            
            // Filter out empty exercises
            const validExercises = creatorExercises.filter(ex => ex.name.trim() !== '' || ex.prescription.trim() !== '');
            
            if (validExercises.length === 0 && !notes && !cooldown) {
                alert('Please add some content to your workout before saving.');
                return;
            }

            const workoutId = uuid();
            const workout = {
                userId: targetUid,
                date: new Date().toISOString(),
                title,
                notes,
                cooldown,
                exercises: JSON.parse(JSON.stringify(validExercises)),
                results: {}
            };

            try {
                await setDoc(doc(db, 'users', targetUid, 'workouts', workoutId), workout);
                clearCreator();
                
                // Switch to workouts tab and view that client
                document.getElementById('w-client-select').value = targetUid;
                selectClientWorkouts(targetUid);
                switchTab('workouts');
            } catch (error) {
                console.error("Error saving workout:", error);
                alert("Failed to save workout: " + error.message);
            }
        };

        window.clearCreator = () => {
            document.getElementById('c-title').value = '';
            document.getElementById('c-notes').value = '';
            document.getElementById('c-cooldown').value = '';
            creatorExercises = [];
            renderCreatorExercises();
        };

        // --- Workouts List & Logger Logic ---
        function renderWorkoutsList() {
            activeWorkoutContainer.classList.add('hidden');
            listWorkouts.classList.remove('hidden');

            if (!currentUser) {
                listWorkouts.innerHTML = `
                    <div class="text-center py-16 bg-card border border-subtle rounded-lg shadow-sm">
                        <i class="fas fa-lock text-4xl text-[#444] mb-4"></i>
                        <p class="text-white font-medium">Please login</p>
                        <p class="text-sm text-subtle mt-1">Sign in to view and create workouts.</p>
                    </div>`;
                return;
            }

            if (workouts.length === 0) {
                listWorkouts.innerHTML = `
                    <div class="text-center py-16 bg-card border border-subtle rounded-lg shadow-sm">
                        <i class="fas fa-clipboard-list text-4xl text-[#444] mb-4"></i>
                        <p class="text-white font-medium">No workouts yet</p>
                        <p class="text-sm text-subtle mt-1">Go to the Creator tab to build one.</p>
                    </div>`;
                return;
            }

            listWorkouts.innerHTML = workouts.map(w => `
                <div class="bg-card border border-subtle rounded-lg p-4 cursor-pointer hover:border-blue-500 transition-colors shadow-sm" onclick="openWorkout('${w.id}')">
                    <h3 class="font-bold text-white text-lg">${w.title}</h3>
                    <p class="text-xs text-subtle mt-1.5 flex items-center gap-2">
                        <i class="far fa-calendar-alt"></i> ${new Date(w.date).toLocaleDateString()} 
                        <span>•</span> 
                        <i class="fas fa-dumbbell"></i> ${w.exercises.length} exercises
                    </p>
                </div>
            `).join('');
        }

        window.deleteActiveWorkout = async () => {
            if (!isAdmin || !activeWorkoutId || !currentViewUid) return;
            if(confirm('Are you sure you want to delete this workout?')) {
                try {
                    await deleteDoc(doc(db, 'users', currentViewUid, 'workouts', activeWorkoutId));
                    // onSnapshot will handle closing the workout
                } catch (error) {
                    console.error("Error deleting workout:", error);
                    alert("Failed to delete workout: " + error.message);
                }
            }
        };

        window.openWorkout = (id) => {
            activeWorkoutId = id;
            listWorkouts.classList.add('hidden');
            activeWorkoutContainer.classList.remove('hidden');
            renderActiveWorkout();
        };

        window.closeWorkout = () => {
            activeWorkoutId = null;
            renderWorkoutsList();
        };

        window.updateResult = async (exId, inputEl) => {
            if (!currentUser || !activeWorkoutId || !currentViewUid) return;
            const w = workouts.find(w => w.id === activeWorkoutId);
            if (w) {
                // Optimistic UI update
                const icon = inputEl.nextElementSibling;
                if (inputEl.value.trim().length > 0) {
                    icon.className = 'fas fa-check-circle text-green-500 absolute right-3 top-3 text-sm';
                } else {
                    icon.className = 'fas fa-times-circle text-red-500 absolute right-3 top-3 text-sm';
                }

                // Update Firestore
                const updatedResults = { ...w.results, [exId]: inputEl.value };
                try {
                    await setDoc(doc(db, 'users', currentViewUid, 'workouts', activeWorkoutId), { results: updatedResults }, { merge: true });
                } catch (error) {
                    console.error("Error updating result:", error);
                    // Revert icon on error
                    if (w.results[exId]?.trim().length > 0) {
                        icon.className = 'fas fa-check-circle text-green-500 absolute right-3 top-3 text-sm';
                    } else {
                        icon.className = 'fas fa-times-circle text-red-500 absolute right-3 top-3 text-sm';
                    }
                }
            }
        };

        function renderActiveWorkout() {
            const w = workouts.find(w => w.id === activeWorkoutId);
            if (!w) return;

            let html = `
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-white mb-3 tracking-tight">${w.title}</h2>
                    ${w.notes ? `
                        <div class="text-sm text-subtle whitespace-pre-wrap mb-4 leading-relaxed">
                            <span class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Coach's Notes / Warmup</span>
                            ${w.notes}
                        </div>
                    ` : ''}
                </div>
            `;

            w.exercises.forEach((ex, i) => {
                const nextEx = w.exercises[i + 1];
                // Check if linked (same first letter in label, e.g. A1 and A2)
                const isLinked = nextEx && ex.label && nextEx.label && 
                                 ex.label.charAt(0).toUpperCase() === nextEx.label.charAt(0).toUpperCase();
                
                const resultVal = w.results[ex.id] || '';
                const hasResult = resultVal.trim().length > 0;
                const iconClass = hasResult ? 'fa-check-circle text-green-500' : 'fa-times-circle text-red-500';

                html += `
                    <div class="relative mb-${isLinked ? '6' : '3'}">
                        <div class="bg-card border border-subtle rounded-md p-3 shadow-sm">
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-white text-sm leading-tight pr-4">
                                    ${ex.label ? `<span class="text-gray-400 mr-1">${ex.label})</span>` : ''}${ex.name}
                                </h3>
                                <div class="flex gap-3 text-gray-500 text-sm shrink-0">
                                    <button onclick="askAboutExercise('${ex.name.replace(/'/g, "\\'")}')" class="hover:text-blue-400 transition-colors" title="Ask AI Coach">
                                        <i class="fas fa-robot"></i>
                                    </button>
                                    <i class="fas fa-history cursor-pointer hover:text-white transition-colors" title="History"></i>
                                </div>
                            </div>
                            <p class="text-xs text-subtle mt-2 mb-3 leading-relaxed">${ex.prescription}</p>
                            <div class="relative">
                                <input type="text" placeholder="Add Results..." value="${resultVal}" oninput="updateResult('${ex.id}', this)" class="w-full bg-input border border-subtle rounded px-3 py-2.5 text-sm text-white focus:outline-none focus:border-gray-500 transition-colors pr-10">
                                <i class="fas ${iconClass} absolute right-3 top-3 text-sm transition-colors"></i>
                            </div>
                        </div>
                        ${isLinked ? `
                        <div class="absolute -bottom-4 left-1/2 transform -translate-x-1/2 z-10">
                            <div class="w-6 h-6 rounded-full bg-[#444] flex items-center justify-center border-2 border-[#222] shadow-sm">
                                <i class="fas fa-link text-[10px] text-gray-400"></i>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;
            });

            if (w.cooldown) {
                html += `
                    <div class="mt-8 pt-6 border-t border-subtle">
                        <span class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Cooldown</span>
                        <div class="text-sm text-subtle whitespace-pre-wrap leading-relaxed">${w.cooldown}</div>
                    </div>
                `;
            }

            workoutDisplay.innerHTML = html;
        }

        // Init
        renderWorkoutsList();

        // --- Chatbot Logic ---
        let chatSession = null;

        window.toggleChat = () => {
            const chatWindow = document.getElementById('chat-window');
            chatWindow.classList.toggle('hidden');
            if (!chatWindow.classList.contains('hidden')) {
                document.getElementById('chat-input').focus();
            }
        };

        window.askAboutExercise = (exerciseName) => {
            const chatWindow = document.getElementById('chat-window');
            if (chatWindow.classList.contains('hidden')) {
                toggleChat();
            }
            
            const inputEl = document.getElementById('chat-input');
            inputEl.value = `How do I perform ${exerciseName}?`;
            sendChatMessage();
        };

        window.sendChatMessage = async () => {
            const inputEl = document.getElementById('chat-input');
            const message = inputEl.value.trim();
            if (!message) return;
            
            inputEl.value = '';
            appendChatMessage('user', message);
            
            const loadingId = appendChatMessage('ai', '<i class="fas fa-ellipsis-h animate-pulse"></i>');
            
            try {
                if (!chatSession) {
                    chatSession = ai.chats.create({
                        model: "gemini-3.1-pro-preview",
                        config: {
                            systemInstruction: "You are an expert fitness AI coach. Explain how to perform exercises safely and effectively. Keep your answers concise, encouraging, and easy to read. Format with basic markdown.",
                        }
                    });
                }
                
                const response = await chatSession.sendMessage({ message: message });
                updateChatMessage(loadingId, response.text);
            } catch (error) {
                console.error("Chat error:", error);
                updateChatMessage(loadingId, "Sorry, I encountered an error connecting to the AI. Please try again.");
            }
        };

        function appendChatMessage(role, content) {
            const messagesEl = document.getElementById('chat-messages');
            const id = 'msg-' + Date.now();
            
            let html = '';
            if (role === 'user') {
                html = `
                    <div class="flex gap-2 justify-end" id="${id}">
                        <div class="bg-blue-600 text-sm text-white p-3 rounded-lg rounded-tr-none max-w-[85%]">
                            ${content}
                        </div>
                    </div>
                `;
            } else {
                html = `
                    <div class="flex gap-2" id="${id}">
                        <div class="w-8 h-8 rounded-full bg-blue-900 flex items-center justify-center shrink-0 mt-1">
                            <i class="fas fa-robot text-blue-300 text-xs"></i>
                        </div>
                        <div class="bg-[#333] text-sm text-gray-200 p-3 rounded-lg rounded-tl-none max-w-[85%] markdown-body">
                            ${content}
                        </div>
                    </div>
                `;
            }
            
            messagesEl.insertAdjacentHTML('beforeend', html);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return id;
        }

        function updateChatMessage(id, content) {
            const msgEl = document.getElementById(id);
            if (msgEl) {
                const contentEl = msgEl.querySelector('.markdown-body');
                if (contentEl) {
                    contentEl.innerHTML = marked.parse(content);
                }
            }
            const messagesEl = document.getElementById('chat-messages');
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
    </script>
</body>
</html>
